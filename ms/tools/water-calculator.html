<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Kalkulator Penggunaan Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/styles.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6929570744326515"
     crossorigin="anonymous"></script>
</head>

<body class="theme-water">

<div class="container">
<div class="card">

<h1>💧 Kalkulator Penggunaan Air</h1>

<p>Masa mandi setiap hari (minit):</p>
<input type="number" id="shower">

<p>Bilangan orang dalam rumah:</p>
<input type="number" id="people">

<button onclick="calcWater()">Kira</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/ms/">← Kembali ke Laman Utama</a>

</div>
</div>

<script>
function calcWater() {
  let shower = document.getElementById("shower").value || 0;
  let people = document.getElementById("people").value || 0;

  let water = shower * people * 9 * 30;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "💧 Anggaran penggunaan air bulanan: <b>" + water + " liter</b>";
}
</script>

</body>
</html>
