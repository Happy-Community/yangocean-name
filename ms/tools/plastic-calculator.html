<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Kalkulator Sisa Plastik & CO₂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="container">
<div class="card">

<h1>🧴 Kalkulator Sisa Plastik & CO₂</h1>

<p>Botol plastik digunakan setiap minggu:</p>
<input type="number" id="bottles">

<p>Beg plastik digunakan setiap minggu:</p>
<input type="number" id="bags">

<button onclick="calcPlastic()">Kira</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/ms/">← Kembali ke Laman Utama</a>

</div>
</div>

<script>
function calcPlastic() {
  let bottles = document.getElementById("bottles").value || 0;
  let bags = document.getElementById("bags").value || 0;

  let yearlyBottles = bottles * 52;
  let yearlyBags = bags * 52;

  let totalItems = yearlyBottles + yearlyBags;

  let bottleCO2 = yearlyBottles * 0.025;
  let bagCO2 = yearlyBags * 0.005;

  let totalCO2 = bottleCO2 + bagCO2;

  let rating = totalCO2 < 10 ? "Rendah 🌱"
             : totalCO2 < 50 ? "Sederhana ⚠️"
             : "Tinggi 🔴";

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🧴 Penggunaan plastik tahunan: <b>" + totalItems + " item</b><br>" +
    "🌍 Anggaran CO₂: <b>" + totalCO2.toFixed(2) + " kg/tahun</b><br>" +
    "📊 Tahap impak: <b>" + rating + "</b>";
}
</script>

</body>
</html>
