<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Kalkulator Jejak Karbon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-adsense-account" content="ca-pub-6929570744326515">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6929570744326515"
     crossorigin="anonymous"></script>  
<!-- GLOBAL STYLES -->
<link rel="stylesheet" href="/styles.css">
</head>

<!-- 🌍 THEME FIX -->
<body class="theme-carbon">

<div class="container">
  <div class="card">

    <h1>🌍 Kalkulator Jejak Karbon</h1>

    <p>Penggunaan elektrik (kWh/bulan):</p>
    <input type="number" id="electricity" placeholder="cth: 200">

    <p>Perjalanan kereta (km/bulan):</p>
    <input type="number" id="transport" placeholder="cth: 100">

    <button onclick="calcCarbon()">Kira</button>

    <div id="result" class="result" style="display:none;"></div>

    <a class="back" href="/ms/">← Kembali ke Laman Utama</a>

  </div>
</div>

<script>
function calcCarbon() {
  let e = document.getElementById("electricity").value || 0;
  let t = document.getElementById("transport").value || 0;

  // CO2 estimation
  let co2 = (e * 0.5) + (t * 0.2);

  let resultBox = document.getElementById("result");
  resultBox.style.display = "block";

  resultBox.innerHTML =
    "🌱 Anggaran pelepasan CO₂: <b>" + co2.toFixed(1) + " kg/bulan</b><br>" +
    "📊 Tahap impak: <b>" + getLevel(co2) + "</b>";
}

function getLevel(co2) {
  if (co2 < 50) return "Rendah 🌱";
  if (co2 < 150) return "Sederhana ⚠️";
  return "Tinggi 🔴";
}
</script>

</body>
</html>
