<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Kalkulator Oksigen Pokok</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GLOBAL CSS -->
<link rel="stylesheet" href="/styles.css">
</head>

<body class="theme-tree">

<div class="container">
  <div class="card">

    <h1>🌳 Kalkulator Oksigen Pokok</h1>

    <p>Masukkan bilangan orang:</p>
    <input type="number" id="people" placeholder="cth: 4">

    <button onclick="calcTree()">Kira</button>

    <div id="result" class="result" style="display:none;"></div>

    <a class="back" href="/ms/">← Kembali ke Laman Utama</a>

  </div>
</div>

<script>
function calcTree() {
  let p = document.getElementById("people").value || 0;
  let resultBox = document.getElementById("result");

  if (p <= 0) {
    alert("Sila masukkan nombor yang sah");
    return;
  }

  // Improved logic (more realistic estimate)
  // approx: 1 tree supports ~2–4 people oxygen needs (simplified model)
  let trees = Math.ceil(p / 3);

  resultBox.style.display = "block";

  resultBox.innerHTML =
    "🌱 Anda memerlukan <b>" + trees + "</b> pokok untuk menyokong <b>" + p + "</b> orang.<br>" +
    "🌍 Ini adalah anggaran pendidikan berdasarkan purata pengeluaran oksigen pokok.";
}
</script>

</body>
</html>
