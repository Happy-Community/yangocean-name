<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Kalkulator Oksigen Pokok</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(to bottom, #e8f5e9, #f4f8f6);
  margin: 0;
  padding: 20px;
}
.container { max-width: 600px; margin: auto; }
.card {
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
h1 { text-align: center; color: #2e7d32; }
input {
  width: 100%; padding: 12px; margin-top: 10px;
  border-radius: 8px; border: 1px solid #ccc;
}
button {
  width: 100%; padding: 12px; margin-top: 15px;
  background: #43a047; color: white; border: none;
  border-radius: 8px; font-size: 16px; cursor: pointer;
}
button:hover { background: #2e7d32; }
.result {
  margin-top: 20px; padding: 15px;
  background: #e8f5e9; border-left: 5px solid #43a047;
  border-radius: 8px; font-size: 18px;
}
.back { display: block; margin-top: 15px; text-align: center; }
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>🌳 Kalkulator Oksigen Pokok</h1>

<p>Masukkan bilangan orang:</p>
<input type="number" id="people" placeholder="cth: 4">

<button onclick="calc()">Kira</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/ms/">← Kembali ke Laman Utama</a>

</div>
</div>

<script>
function calc() {
  let p = document.getElementById("people").value;

  if (p <= 0) {
    alert("Masukkan nombor yang sah");
    return;
  }

  let trees = Math.ceil(p / 2);

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🌱 Anda memerlukan <b>" + trees + "</b> pokok untuk menyokong <b>" + p + "</b> orang.";
}
</script>

</body>
</html>
