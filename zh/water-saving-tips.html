  <p>通过简单习惯节约用水，保护环境。</p>
</section>

<section class="card">
<h2>🌍 为什么节约用水很重要</h2>
<p>
水是生命之源，但也是有限资源。减少用水有助于保护生态系统，并确保未来的可持续供应。
</p>
</section>

<section class="card">
<h2>✅ 简单节水方法</h2>
<ul>
<li>缩短淋浴时间</li>
<li>刷牙时关闭水龙头</li>
<li>及时修理漏水</li>
<li>使用节水电器</li>
<li>尽可能收集雨水</li>
<li>将水重复用于浇花</li>
</ul>
