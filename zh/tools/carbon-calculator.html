<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>碳足迹计算器</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- GLOBAL STYLES -->
<link rel="stylesheet" href="/styles.css">
</head>

<!-- 🌍 THEME FIX -->
<body class="theme-carbon">


<div class="container">
<div class="card">

<h1>🌍 碳足迹计算器</h1>

<p>用电量（千瓦时/月）：</p>
<input type="number" id="electricity">

<p>汽车行驶（公里/月）：</p>
<input type="number" id="transport">

<button onclick="calcCarbon()">计算</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/zh/">← 返回首页</a>

</div>
</div>

<script>
function calcCarbon() {
  let e = document.getElementById("electricity").value || 0;
  let t = document.getElementById("transport").value || 0;

  let co2 = (e * 0.5) + (t * 0.2);

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🌱 预计二氧化碳排放：<b>" + co2.toFixed(1) + " 千克/月</b>";
}
</script>

</body>
</html>
