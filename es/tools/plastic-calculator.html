<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Plástico y CO₂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-adsense-account" content="ca-pub-6929570744326515">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6929570744326515"
     crossorigin="anonymous"></script>  
<link rel="stylesheet" href="/styles.css">
</head>



<body class="theme-plastic">


<div class="container">
<div class="card">

<h1>🧴 Calculadora de Plástico y CO₂</h1>

<p>Botellas de plástico usadas por semana:</p>
<input type="number" id="bottles">

<p>Bolsas de plástico usadas por semana:</p>
<input type="number" id="bags">

<button onclick="calcPlastic()">Calcular</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/es/">← Volver al inicio</a>

</div>
</div>

<script>
function calcPlastic() {
  let bottles = document.getElementById("bottles").value || 0;
  let bags = document.getElementById("bags").value || 0;

  let yearlyBottles = bottles * 52;
  let yearlyBags = bags * 52;

  let totalItems = yearlyBottles + yearlyBags;

  let bottleCO2 = yearlyBottles * 0.025;
  let bagCO2 = yearlyBags * 0.005;

  let totalCO2 = bottleCO2 + bagCO2;

  let rating = totalCO2 < 10 ? "Bajo 🌱"
             : totalCO2 < 50 ? "Medio ⚠️"
             : "Alto 🔴";

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🧴 Uso anual de plástico: <b>" + totalItems + " artículos</b><br>" +
    "🌍 CO₂ estimado: <b>" + totalCO2.toFixed(2) + " kg/año</b><br>" +
    "📊 Nivel de impacto: <b>" + rating + "</b>";
}
</script>

</body>
</html>
