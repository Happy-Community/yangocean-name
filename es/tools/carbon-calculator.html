<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Huella de Carbono</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6929570744326515"
     crossorigin="anonymous"></script>
  
<!-- GLOBAL STYLES -->
<link rel="stylesheet" href="/styles.css">
</head>

<!-- 🌍 THEME FIX -->
<body class="theme-carbon">

<div class="container">
<div class="card">

<h1>🌍 Calculadora de Huella de Carbono</h1>

<p>Uso de electricidad (kWh/mes):</p>
<input type="number" id="electricity">

<p>Viaje en coche (km/mes):</p>
<input type="number" id="transport">

<button onclick="calcCarbon()">Calcular</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/es/">← Volver al inicio</a>

</div>
</div>

<script>
function calcCarbon() {
  let e = document.getElementById("electricity").value || 0;
  let t = document.getElementById("transport").value || 0;

  let co2 = (e * 0.5) + (t * 0.2);

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🌱 Emisiones estimadas de CO₂: <b>" + co2.toFixed(1) + " kg/mes</b>";
}
</script>

</body>
</html>
