<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculateur d’empreinte carbone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6929570744326515"
     crossorigin="anonymous"></script>

<!-- GLOBAL STYLES -->
<link rel="stylesheet" href="/styles.css">
</head>

<!-- 🌍 THEME FIX -->
<body class="theme-carbon">



<div class="container">
<div class="card">

<h1>🌍 Calculateur d’empreinte carbone</h1>

<p>Consommation d’électricité (kWh/mois) :</p>
<input type="number" id="electricity">

<p>Trajet en voiture (km/mois) :</p>
<input type="number" id="transport">

<button onclick="calcCarbon()">Calculer</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/fr/">← Retour à l’accueil</a>

</div>
</div>
<script>
function calcCarbon() {
  let e = document.getElementById("electricity").value || 0;
  let t = document.getElementById("transport").value || 0;

  if (e <= 0 && t <= 0) {
    alert("Veuillez entrer des valeurs valides");
    return;
  }

  let co2 = (e * 0.5) + (t * 0.2);

  let level =
    co2 < 50 ? "Faible 🌱" :
    co2 < 150 ? "Moyen ⚠️" :
    "Élevé 🔴";

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🌱 Émissions estimées de CO₂ : <b>" + co2.toFixed(1) + " kg/mois</b><br>" +
    "📊 Niveau d’impact : <b>" + level + "</b>";
}
</script>

</body>
</html>
