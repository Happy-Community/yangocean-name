<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculateur Plastique & CO₂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="container">
<div class="card">

<h1>🧴 Calculateur Plastique & CO₂</h1>

<p>Bouteilles en plastique par semaine :</p>
<input type="number" id="bottles">

<p>Sacs plastiques par semaine :</p>
<input type="number" id="bags">

<button onclick="calcPlastic()">Calculer</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="/fr/">← Retour à l’accueil</a>

</div>
</div>

<script>
function calcPlastic() {
  let bottles = document.getElementById("bottles").value || 0;
  let bags = document.getElementById("bags").value || 0;

  let yearlyBottles = bottles * 52;
  let yearlyBags = bags * 52;

  let totalItems = yearlyBottles + yearlyBags;

  let bottleCO2 = yearlyBottles * 0.025;
  let bagCO2 = yearlyBags * 0.005;

  let totalCO2 = bottleCO2 + bagCO2;

  let rating = totalCO2 < 10 ? "Faible 🌱"
             : totalCO2 < 50 ? "Moyen ⚠️"
             : "Élevé 🔴";

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🧴 Usage annuel de plastique : <b>" + totalItems + " articles</b><br>" +
    "🌍 CO₂ estimé : <b>" + totalCO2.toFixed(2) + " kg/an</b><br>" +
    "📊 Niveau d’impact : <b>" + rating + "</b>";
}
</script>

</body>
</html>
