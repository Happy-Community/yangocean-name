<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water Usage Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GLOBAL STYLES ONLY -->
<link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="container">
<div class="card">

<h1>💧 Water Usage Calculator</h1>

<p>Shower time per day (minutes):</p>
<input type="number" id="shower" placeholder="e.g. 10">

<p>Number of people in household:</p>
<input type="number" id="people" placeholder="e.g. 4">

<button onclick="calcWater()">Calculate</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="../index.html">← Back to Home</a>

</div>
</div>

<script>
function calcWater() {
  let shower = document.getElementById("shower").value || 0;
  let people = document.getElementById("people").value || 0;

  // Estimate: 9 liters per minute per person
  let water = shower * people * 9 * 30;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "💧 Estimated monthly water usage: <b>" + water + " liters</b>";
}
</script>

</body>
</html>
