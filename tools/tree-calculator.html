<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tree Carbon Offset Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/styles.css">
</head>

<body class="theme-tree">

<div class="container">
<div class="card">

<h1>🌳 Tree Carbon Offset Calculator</h1>

<p>Enter number of people:</p>
<input type="number" id="people" placeholder="e.g. 4">

<button onclick="calcTree()">Calculate</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="../index.html">← Back to Home</a>

</div>
</div>

<script>
function calcTree() {
  let p = document.getElementById("people").value || 0;

  if (p <= 0) {
    alert("Please enter a valid number of people");
    return;
  }

  // 🌍 CO2 emissions per person (global average simplified range)
  let co2PerPerson = 4000; // kg/year (adjustable baseline)

  // 🌳 Tree absorption (more realistic range)
  let treeMin = 10;  // young/mixed forest average
  let treeMax = 25;  // mature tree in good conditions
  let treeAvg = 18;  // balanced estimate

  let totalCO2 = p * co2PerPerson;

  let treesMin = Math.ceil(totalCO2 / treeMax);
  let treesMax = Math.ceil(totalCO2 / treeMin);
  let treesAvg = Math.ceil(totalCO2 / treeAvg);

  // 🌬️ Oxygen estimation (scientific approximation)
  // 1 mature tree produces ~100–150 kg oxygen/year
  let oxygenPerTree = 120;

  let oxygenTotal = treesAvg * oxygenPerTree;

  // 🌳 Visual grouping (UX only, not scientific)
  let largeTrees = Math.round(treesAvg / 3);
  let mediumTrees = Math.round(treesAvg / 2);
  let smallTrees = treesAvg;

  // 🌲 Forest label
  let forestType =
    treesAvg < 50 ? "a small grove 🌱"
    : treesAvg < 200 ? "a medium forest 🌳"
    : "a large forest 🌲";

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🌍 Total CO₂ footprint: <b>" + totalCO2.toLocaleString() + " kg/year</b><br><br>" +

    "🌳 Estimated tree offset (range):<br>" +
    "• Low estimate: <b>" + treesMax.toLocaleString() + "</b> trees<br>" +
    "• High efficiency: <b>" + treesMin.toLocaleString() + "</b> trees<br>" +
    "• Balanced estimate: <b>" + treesAvg.toLocaleString() + "</b> trees<br><br>" +

    "🌱 Forest perspective: " + forestType + "<br><br>" +

    "🌬️ Estimated oxygen production (based on mature trees):<br>" +
    "<b>" + oxygenTotal.toLocaleString() + " kg O₂/year</b><br><br>" +

    "🌿 Visual breakdown (approximate):<br>" +
    "• 🌱 " + smallTrees + " small trees<br>" +
    "• 🌳 " + mediumTrees + " medium trees<br>" +
    "• 🌲 " + largeTrees + " mature trees<br><br>" +

    "💡 Note: This is a simplified educational model. Real-world values vary by climate, tree species, and growth conditions.<br><br>" +

    "📘 Trees do not offset emissions instantly — carbon absorption happens gradually over years.";
}
</script>

</body>
</html>
