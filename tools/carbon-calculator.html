<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carbon Footprint Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GLOBAL CSS -->
<link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="container">

  <div class="card">

    <h1>🌍 Carbon Footprint Calculator</h1>

    <p>Electricity usage (kWh/month):</p>
    <input type="number" id="electricity" placeholder="e.g. 200">

    <p>Car travel (km/month):</p>
    <input type="number" id="transport" placeholder="e.g. 150">

    <button onclick="calcCarbon()">Calculate</button>

    <div id="result" class="result" style="display:none;"></div>

    <a class="back" href="../index.html">← Back to Home</a>

  </div>

</div>

<script>
function calcCarbon() {
  let e = document.getElementById("electricity").value || 0;
  let t = document.getElementById("transport").value || 0;

  let co2 = (e * 0.5) + (t * 0.2);

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🌱 Estimated CO₂ emission: <b>" + co2.toFixed(1) + " kg/month</b>";
}
</script>

</body>
</html>
