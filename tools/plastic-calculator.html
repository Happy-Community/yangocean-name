<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plastic Waste & CO₂ Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(to bottom, #fce4ec, #f4f8f6);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  color: #c2185b;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #d81b60;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #880e4f;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #fce4ec;
  border-left: 5px solid #d81b60;
  border-radius: 8px;
  line-height: 1.6;
}

.back {
  display: block;
  margin-top: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🧴 Plastic Waste & CO₂ Calculator</h1>

<p>Plastic bottles used per week:</p>
<input type="number" id="bottles">

<p>Plastic bags used per week:</p>
<input type="number" id="bags">

<button onclick="calcPlastic()">Calculate</button>

<div id="result" class="result" style="display:none;"></div>

<a class="back" href="../index.html">← Back to Home</a>

</div>
</div>

<script>
function calcPlastic() {
  let bottles = document.getElementById("bottles").value || 0;
  let bags = document.getElementById("bags").value || 0;

  // yearly usage
  let yearlyBottles = bottles * 52;
  let yearlyBags = bags * 52;

  let totalItems = yearlyBottles + yearlyBags;

  // CO2 estimates (kg per item)
  let bottleCO2 = yearlyBottles * 0.025;
  let bagCO2 = yearlyBags * 0.005;

  let totalCO2 = bottleCO2 + bagCO2;

  // Eco rating
  let rating = "";
  if (totalCO2 < 10) {
    rating = "Low 🌱 (Good)";
  } else if (totalCO2 < 50) {
    rating = "Medium ⚠️ (Moderate)";
  } else {
    rating = "High 🔴 (High Impact)";
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    "🧴 Yearly plastic usage: <b>" + totalItems + " items</b><br>" +
    "🌍 Estimated CO₂ impact: <b>" + totalCO2.toFixed(2) + " kg/year</b><br>" +
    "📊 Eco rating: <b>" + rating + "</b>";
}
</script>

</body>
</html>
